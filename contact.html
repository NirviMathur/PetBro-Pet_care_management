<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>PetBro - Pet care management</title>
</head>
<body>
    <header class="navbar">
        <div class="logo">🐾PetBro</div>
        <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="product.html">Product</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        </nav>
    </header>
    <section class="contact-form">
        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="text" placeholder="Email" required>
            <input type="tel" placeholder="Mobile Number" required>
            <input type="date" required>

            <select required>
                <option>Pet Type</option>
                <option>Cat</option>
                <option>Bird</option>
                <option>other</option>
            </select>
            <input type="text" placeholder="Breed" required>

            <label>Gender:</label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Femal


            <label>Services:</label>
            <input type="checkbox"> Vet Booking
            <input type="checkbox"> Vaccination
            <input type="checkbox"> Food Reminder

            <textarea placeholder="Additional Notes"></textarea>

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </form>
    </section>
    <footer>
        <div>
            <h3>🐾PetBro</h3>
            <p>Your pet’s best care partner</p>
        </div>

        <div>
            <p>Email: support@petbro.com</p>
        <p>Instagram: @petBro</p>
        <p>Phone: +91 9876543210</p>
        </div>

        <p class="copy">© 2026 PetBro. All rights reserved.</p>
    </footer>
    
</body>
</html>
